<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Finder</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen font-sans">

<!-- Navbar -->
<nav class="bg-gray-900 text-white shadow-lg">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-wide">GitHub Finder</h1>
    <p class="text-gray-400 text-sm">Search GitHub Users</p>
  </div>
</nav>

<!-- Search Section -->
<section class="max-w-4xl mx-auto mt-10 px-6">
  
  <div class="bg-white shadow-lg rounded-xl p-6">
    
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">
      Search GitHub User
    </h2>

    <div class="flex gap-4">
      <input 
        type="text" 
        placeholder="Enter GitHub username..."
        class="usernameinp flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
      >

      <button class=" search bg-black text-white px-6 py-3 rounded-lg hover:bg-gray-800 transition">
        Search
      </button>
    </div>

  </div>
</section>


<!-- User Profile Card -->
<section class="max-w-4xl mx-auto mt-8 px-6">

  <div class="bg-white rounded-xl shadow-lg p-6 flex flex-col md:flex-row gap-6">

    <!-- Avatar -->
    <div class="flex justify-center">
      <img 
        src="https://avatars.githubusercontent.com/u/9919?v=4" 
        class="w-32 h-32 rounded-full border"
      >
    </div>

    <!-- User Info -->
    <div class="flex-1">

      <h2 class="text-2xl font-bold text-gray-800">
        GitHub
      </h2>

      <p class="text-gray-500">@github</p>

      <p class="mt-3 text-gray-700">
        How people build software.
      </p>

      <!-- Stats -->
      <div class="flex gap-8 mt-4 text-sm text-gray-700">

        <div>
          <p class="font-semibold">Followers</p>
          <p>12000</p>
        </div>

        <div>
          <p class="font-semibold">Following</p>
          <p>10</p>
        </div>

        <div>
          <p class="font-semibold">Repos</p>
          <p>400</p>
        </div>

      </div>

      <!-- Profile Button -->
      <a 
        href="#"
        class="inline-block mt-4 bg-gray-900 text-white px-5 py-2 rounded-lg hover:bg-gray-800 transition"
      >
        View GitHub Profile
      </a>

    </div>

  </div>

</section>


<!-- Repositories -->
<section class="max-w-4xl mx-auto mt-10 px-6 pb-10">

  <h2 class="text-xl font-semibold text-gray-800 mb-4">
    Popular Repositories
  </h2>

  <div class="grid md:grid-cols-2 gap-4">

    <!-- Repo Card -->
    <div class="bg-white p-5 rounded-lg shadow hover:shadow-lg transition">
      <h3 class="font-semibold text-lg text-gray-800">
        VS Code
      </h3>
      <p class="text-gray-600 text-sm mt-2">
        Visual Studio Code editor
      </p>
      <div class="text-sm text-gray-500 mt-3">
        ⭐ 150k Stars
      </div>
    </div>

    <div class="bg-white p-5 rounded-lg shadow hover:shadow-lg transition">
      <h3 class="font-semibold text-lg text-gray-800">
        React
      </h3>
      <p class="text-gray-600 text-sm mt-2">
        A JavaScript library for building UI
      </p>
      <div class="text-sm text-gray-500 mt-3">
        ⭐ 210k Stars
      </div>
    </div>

  </div>

</section>
<script src="app.js"></script>r
</body>
</html>
